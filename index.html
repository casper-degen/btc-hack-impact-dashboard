<script>
// ---- Tab switching ----
const tabBtns = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-panel');
function activateTab(name) {
  tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  tabPanels.forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if (history.replaceState) history.replaceState(null, '', '#' + name);
}
tabBtns.forEach(b => b.addEventListener('click', () => activateTab(b.dataset.tab)));
const initTab = location.hash.replace('#','') || 'aave';
activateTab(['aave','morpho','spark'].includes(initTab) ? initTab : 'aave');

// ---- Formatters ----
function fmtB(usd) { return '$' + (usd / 1e9).toFixed(2) + 'B'; }
function fmtM(usd) { return '$' + (usd / 1e6).toFixed(0) + 'M'; }
function fmtBTC(n) { return n.toLocaleString('en-US', {maximumFractionDigits: 0}) + ' BTC'; }
function fmtPct(p) {
  const cls = p >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${p >= 0 ? '+' : ''}${p.toFixed(1)}%</span>`;
}
function shortDate(iso) {
  const d = new Date(iso + 'T00:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
}

// ---- Unified SVG Line Chart ----
// points: [{date:'YYYY-MM-DD', value: number}]
// annotations: [{date:'YYYY-MM-DD', label:'string', color:'#hex'}]
// opts: {color, yFmt, title}
function buildLineChart(points, annotations, opts) {
  const W = 820, H = 120, PL = 64, PR = 16, PT = 14, PB = 28;
  const IW = W - PL - PR, IH = H - PT - PB;
  const LINE_COLOR = opts.color || '#34d399';
  const yFmt = opts.yFmt || (v => fmtB(v));

  const vals = points.map(p => p.value);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const n = points.length;

  function xPos(i) { return PL + (i / (n - 1)) * IW; }
  function yPos(v) { return PT + (1 - (v - minV) / range) * IH; }

  // Y gridlines (4 levels)
  const gridCount = 4;
  let gridLines = '';
  let yLabels = '';
  for (let i = 0; i <= gridCount; i++) {
    const v = minV + (range * i / gridCount);
    const y = yPos(v);
    gridLines += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W - PR}" y2="${y.toFixed(1)}" style="stroke:var(--chart-grid)" stroke-width="1"/>`;
    yLabels += `<text x="${PL - 4}" y="${(y + 4).toFixed(1)}" style="fill:var(--chart-axis)" font-size="9" text-anchor="end" font-family="-apple-system,sans-serif">${yFmt(v)}</text>`;
  }

  // Polyline
  const polyPts = points.map((p, i) => `${xPos(i).toFixed(1)},${yPos(p.value).toFixed(1)}`).join(' ');

  // Fill gradient
  const fillPts = `M ${xPos(0).toFixed(1)},${yPos(points[0].value).toFixed(1)} ` +
    points.slice(1).map((p, i) => `L ${xPos(i+1).toFixed(1)},${yPos(p.value).toFixed(1)}`).join(' ') +
    ` L ${xPos(n-1).toFixed(1)},${(PT+IH).toFixed(1)} L ${xPos(0).toFixed(1)},${(PT+IH).toFixed(1)} Z`;

  // Annotation markers
  let annotSvg = '';
  (annotations || []).forEach(a => {
    const idx = points.findIndex(p => p.date === a.date);
    if (idx < 0) return;
    const x = xPos(idx), y = yPos(points[idx].value);
    const ac = a.color || '#64748b';
    // vertical dashed line
    annotSvg += `<line x1="${x.toFixed(1)}" y1="${PT}" x2="${x.toFixed(1)}" y2="${(PT+IH).toFixed(1)}" stroke="${ac}" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>`;
    // dot
    annotSvg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${ac}" style="stroke:var(--bg-card)" stroke-width="1.5"/>`;
    // label - position to avoid overlap
    const labelX = idx < n - 2 ? x + 4 : x - 4;
    const anchor = idx < n - 2 ? 'start' : 'end';
    annotSvg += `<text x="${labelX.toFixed(1)}" y="${(y - 7).toFixed(1)}" fill="${ac}" font-size="9" font-weight="600" text-anchor="${anchor}" font-family="-apple-system,sans-serif">${a.label}</text>`;
  });

  // End dot (current)
  const lastX = xPos(n-1), lastY = yPos(points[n-1].value);
  annotSvg += `<circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="${LINE_COLOR}" style="stroke:var(--bg-card)" stroke-width="1.5"/>`;

  // X axis date labels (show first, middle, last + annotated)
  const annotDates = new Set((annotations||[]).map(a=>a.date));
  const xLabelIdxs = new Set([0, Math.floor(n/2), n-1]);
  points.forEach((p,i) => { if (annotDates.has(p.date)) xLabelIdxs.add(i); });
  let xAxisLabels = '';
  xLabelIdxs.forEach(i => {
    const x = xPos(i);
    const anchor = i === 0 ? 'start' : i === n-1 ? 'end' : 'middle';
    xAxisLabels += `<text x="${x.toFixed(1)}" y="${(PT+IH+16).toFixed(1)}" style="fill:var(--chart-axis)" font-size="9" text-anchor="${anchor}" font-family="-apple-system,sans-serif">${shortDate(points[i].date)}</text>`;
  });

  const uid = 'cg' + Math.random().toString(36).slice(2,7);

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;">
  <defs>
    <linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${LINE_COLOR}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${LINE_COLOR}" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  ${gridLines}
  ${yLabels}
  <path d="${fillPts}" fill="url(#${uid})"/>
  <polyline points="${polyPts}" fill="none" stroke="${LINE_COLOR}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  ${annotSvg}
  ${xAxisLabels}
</svg>`;
}

// ---- AAVE RENDER ----
function renderAave(data) {

  const btcNetUsd = DATES.map(d => {
    let net = 0, dep = 0;
    Object.values(btcTl).forEach(assetDays => {
      const v = assetDays[d];
      if (v) { net += (v.net_usd || 0); dep += (v.deposits_usd || 0); }
    });
    return { date: d, netUsd: net, depUsd: dep };
  });

  // Compute daily BTC deposits (native BTC) summed across all assets
  const btcDepBtc = DATES.map(d => {
    let dep = 0;
    Object.values(btcTl).forEach(assetDays => {
      const v = assetDays[d];
      if (v) dep += (v.deposits_btc || 0);
    });
    return { date: d, value: dep };
  });

  // Section 1 chart: protocol-wide TVL (DefiLlama multichain)
  const s1Points = protTvl.map(e => ({ date: e.date, value: e.totalUsd }));

  // Section 1 KPIs derived from protocolTvlTimeline (multichain, all assets)
  const protPre    = protTvl.reduce((a,b) => b.totalUsd > a.totalUsd ? b : a, protTvl[0]);
  const protTrough = protTvl.reduce((a,b) => b.totalUsd < a.totalUsd ? b : a, protTvl[0]);
  const protCur    = protTvl[protTvl.length - 1];

  const protCurDropPct    = ((protCur.totalUsd - protPre.totalUsd) / protPre.totalUsd) * 100;

  // Section 2 KPI: BTC recovery from trough (Aave)

  const aaveRecoveryBtc   = km.btcMarkets.currentBtc - km.btcMarkets.troughBtc;
  const aaveRecoveryPct   = aaveDropAtTrough > 0 ? (aaveRecoveryBtc / aaveDropAtTrough) * 100 : 0;

  // Section 2 chart: BTC net TVL (deposits - borrows USD)
  const s2Points = btcNetUsd.map(e => ({ date: e.date, value: e.netUsd }));

  // Section 3 chart 1: total BTC deposits (native)
  const s3BtcPoints = btcDepBtc;

  // Section 3 chart 2: total BTC deposits (USD)
  const s3UsdPoints = btcNetUsd.map(e => ({ date: e.date, value: e.depUsd }));

  const ANNOTS_PROTO = [
    { date: '2026-04-18', label: 'Hack', color: '#f87171' },
    { date: '2026-04-25', label: 'Trough', color: '#fbbf24' },
    { date: '2026-04-27', label: 'Current', color: '#34d399' },
  ];
  const ANNOTS_BTC = [
    { date: '2026-04-17', label: 'Pre-Hack', color: '#94a3b8' },
    { date: '2026-04-24', label: 'Trough', color: '#fbbf24' },
    { date: '2026-04-27', label: 'Current', color: '#34d399' },
  ];

  // BTC markets table — filter to isBtc from perMarketSnapshot (multichain), sort by preDepositBtc desc
  const btcMkts = (pms?.markets || [])
    .filter(m => m.isBtc)
    .sort((a,b) => (b.preDepositBtc||0) - (a.preDepositBtc||0));

  const mktRows = btcMkts.map(m => {
    const drop = m.dropPct ?? 0;
    const troughBtc = m.troughDepositBtc ?? '—';
    const troughBtcFmt = typeof troughBtc === 'number' ? Math.round(troughBtc).toLocaleString() + ' BTC' : '—';
    return `<tr>
      <td>${m.asset}</td>
      <td>${m.chain}</td>
      <td>${Math.round(m.preDepositBtc||0).toLocaleString()} BTC</td>
      <td>${troughBtcFmt}</td>
      <td>${m.currentDepositBtc != null ? Math.round(m.currentDepositBtc).toLocaleString() + ' BTC' : '—'}</td>
      <td class="${drop <= -40 ? 'neg' : drop <= -20 ? 'yellow' : 'muted'}">${drop.toFixed(1)}%</td>
    </tr>`;
  }).join('');

  // Trough for BTC: Apr 24
  const troughBtcDate = km.btcMarkets.troughDate || '2026-04-24';

  const html = `
<!-- Section 1: Protocol Overview -->

function renderSpark(data) {
  const km = data.keyMetrics;
  const protTvl = data.protocolTvlTimeline || [];
  const btcTl = data.btcDailyTimeline || {};
  const pms = data.perMarketSnapshot;

  const DATES = ['2026-04-17','2026-04-18','2026-04-19','2026-04-20','2026-04-21','2026-04-22','2026-04-23','2026-04-24','2026-04-25','2026-04-26','2026-04-27'];

  // Daily aggregated BTC net TVL
  const btcNetUsd = DATES.map(d => {
    let net = 0, dep = 0;
    Object.values(btcTl).forEach(assetDays => {
      const v = assetDays[d];
      if (v) { net += (v.net_usd || 0); dep += (v.deposits_usd || 0); }
    });
    return { date: d, netUsd: net, depUsd: dep };
  });

  // Daily BTC deposits native
  const btcDepBtc = DATES.map(d => {
    let dep = 0;
    Object.values(btcTl).forEach(assetDays => {
      const v = assetDays[d];
      if (v) dep += (v.deposits_btc || 0);
    });
    return { date: d, value: dep };
  });

  // Section 1: protocol-wide TVL (DefiLlama multichain)
  const s1Points = protTvl.map(e => ({ date: e.date, value: e.totalUsd }));
  const protPre    = protTvl.reduce((a,b) => a.date <= '2026-04-17' && b.date > '2026-04-17' ? a : (b.date <= '2026-04-17' ? b : a), protTvl[0]);
  const protTrough = protTvl.reduce((a,b) => b.totalUsd < a.totalUsd ? b : a, protTvl[0]);
  const protCur    = protTvl[protTvl.length - 1];
  const protTroughDropPct = ((protTrough.totalUsd - protPre.totalUsd) / protPre.totalUsd) * 100;
  const protCurChangePct  = ((protCur.totalUsd - protPre.totalUsd) / protPre.totalUsd) * 100;

  // Section 2: BTC change (gain or loss)
  const s2Points = btcNetUsd.map(e => ({ date: e.date, value: e.netUsd }));
  const s3BtcPoints = btcDepBtc;

  const isGain = km.btcMarkets.dropBtc >= 0;

  const ANNOTS_PROTO = [
    { date: '2026-04-18', label: 'Hack', color: '#f87171' },
    { date: protTrough.date, label: 'Trough', color: '#fbbf24' },
    { date: protCur.date,   label: 'Current', color: '#34d399' },
  ];
  const ANNOTS_BTC = [
    { date: '2026-04-17', label: 'Pre-Hack', color: '#94a3b8' },
    { date: '2026-04-19', label: 'Inflow', color: '#3b82f6' },
    { date: km.btcMarkets.currentDate, label: 'Current', color: '#34d399' },
  ];

  // BTC markets table
  const btcMkts = (pms?.markets || [])
    .filter(m => m.isBtc)
    .sort((a,b) => (b.currentDepositBtc||0) - (a.currentDepositBtc||0));

  const mktRows = btcMkts.map(m => {
    const change = m.dropPct ?? 0;
    const cls = change < -20 ? 'neg' : change >= 0 ? 'pos' : 'yellow';
    const preStr = m.preDepositBtc > 0 ? Math.round(m.preDepositBtc).toLocaleString() + ' BTC' : '—';
    const trBtc = m.troughDepositBtc != null ? m.troughDepositBtc : m.preDepositBtc;
    const trStr = trBtc > 0 ? Math.round(trBtc).toLocaleString() + ' BTC' : '—';
    return `<tr>
      <td>${m.asset}</td>
      <td>${m.chain}</td>
      <td>${preStr}</td>
      <td>${trStr}</td>
      <td>${m.currentDepositBtc != null ? Math.round(m.currentDepositBtc).toLocaleString() + ' BTC' : '—'}</td>
      <td class="${cls}">${change >= 0 ? '+' : ''}${change.toFixed(1)}%</td>
    </tr>`;
  }).join('');

  // Section 1 Total change (may be gain)
  const s1TotalLossUsd = protCur.totalUsd - protPre.totalUsd;
  const s1IsGain = s1TotalLossUsd >= 0;

  const html = `

<div class="kpi-grid">
  <div class="kpi">
    <div class="kpi-label">Pre-Hack TVL</div>
    <div class="kpi-val">${fmtB(protPre.totalUsd)}</div>
    <div class="kpi-sub muted">${shortDate(protPre.date)} · multichain · all assets</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Trough TVL</div>
    <div class="kpi-val red">${fmtB(protTrough.totalUsd)}</div>
    <div class="kpi-sub red">${protTroughDropPct.toFixed(1)}% drop · ${shortDate(protTrough.date)}</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Current TVL</div>
    <div class="kpi-val ${s1IsGain ? 'green' : 'yellow'}">${fmtB(protCur.totalUsd)}</div>
    <div class="kpi-sub ${s1IsGain ? 'green' : 'muted'}">${shortDate(protCur.date)} · ${protCurChangePct >= 0 ? '+' : ''}${protCurChangePct.toFixed(1)}% from pre-hack</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">${s1IsGain ? 'Total Gain' : 'Total Loss'}</div>
    <div class="kpi-val ${s1IsGain ? 'green' : 'red'}">${s1IsGain ? '+' : ''}${fmtB(s1TotalLossUsd)}</div>
    <div class="kpi-sub ${s1IsGain ? 'green' : 'red'}">${protCurChangePct >= 0 ? '+' : ''}${protCurChangePct.toFixed(1)}% from pre-hack · multichain TVL</div>
  </div>
</div>
<div class="chart-wrap">
  <div class="chart-label">Spark Protocol — Protocol TVL (Multichain, All Assets) · Apr 17 → Apr 27 · DefiLlama</div>
  ${buildLineChart(s1Points, ANNOTS_PROTO, { color: '#a78bfa', yFmt: v => '$' + (v/1e9).toFixed(1) + 'B' })}
</div>

    <div class="kpi-sub muted">${fmtB(km.btcMarkets.preHackUsd)} · ${shortDate(km.btcMarkets.preHackDate)}</div>
  </div>
  <div class="kpi">

  <div class="kpi">

  <div class="kpi">

    <div class="kpi-val ${isGain ? 'green' : 'red'}">${isGain ? '+' : ''}${Math.round(Math.abs(km.btcMarkets.dropBtc)).toLocaleString()} BTC</div>

  </div>

<div class="chart-wrap">

// ---- DATA LOADING ----
const cache = {};
async function loadTab(name) {
  if (cache[name]) return;
  try {
    const res = await fetch(`data/${name}.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    cache[name] = data;
    if (name === 'aave') renderAave(data);
    else if (name === 'morpho') renderMorpho(data);
    else if (name === 'spark') renderSpark(data);
  } catch (e) {
    document.getElementById(`${name}-content`).innerHTML =
      `<p class="loading">Error loading ${name}.json: ${e.message}. Serve via HTTP (not file://). Run: python3 -m http.server 8765</p>`;
  }
}

loadTab('aave');
loadTab('morpho');
tabBtns.forEach(b => b.addEventListener('click', () => loadTab(b.dataset.tab)));

// ---- Theme Toggle ----
const toggleBtn = document.getElementById('theme-toggle');
function applyTheme(t) {
  if (t === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    toggleBtn.textContent = '🌙';
  } else {
    document.documentElement.removeAttribute('data-theme');
    toggleBtn.textContent = '☀';
  }
  localStorage.setItem('btc-dashboard-theme', t);
}
applyTheme(document.documentElement.getAttribute('data-theme') || 'light');
toggleBtn.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
